services:
  nginx:
    image: nginx:alpine
    ports:
      - "${APP_PORT:-8088}:80"
    volumes:
      - ./:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      php:
        condition: service_started
    networks:
      - scout

  php:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    volumes:
      - ./:/var/www/html
    environment:
      - PHP_OPCACHE_VALIDATE_TIMESTAMPS=1
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - scout

  mysql:
    image: mysql:8
    ports:
      - "${FORWARD_DB_PORT:-33060}:3306"
    environment:
      MYSQL_ROOT_PASSWORD: "${DB_PASSWORD:-secret}"
      MYSQL_DATABASE: "${DB_DATABASE:-scout}"
      MYSQL_USER: "${DB_USERNAME:-scout}"
      MYSQL_PASSWORD: "${DB_PASSWORD:-secret}"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_PASSWORD:-secret}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - scout

  redis:
    image: redis:alpine
    ports:
      - "${FORWARD_REDIS_PORT:-63790}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - scout

  horizon:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    command: php artisan horizon
    volumes:
      - ./:/var/www/html
    depends_on:
      php:
        condition: service_started
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - scout
    restart: unless-stopped

  scheduler:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    command: php artisan schedule:work
    volumes:
      - ./:/var/www/html
    depends_on:
      php:
        condition: service_started
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - scout
    restart: unless-stopped

  mailpit:
    image: axllent/mailpit
    ports:
      - "${FORWARD_MAILPIT_PORT:-8025}:8025"
      - "${FORWARD_MAILPIT_SMTP_PORT:-1025}:1025"
    networks:
      - scout

networks:
  scout:
    driver: bridge

volumes:
  mysql_data:
  redis_data:
